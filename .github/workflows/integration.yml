name: Integration Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integration-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up CI toolchain
        uses: ./.github/actions/setup-ci
      - name: Configure QEMU integration tests
        run: cmake --preset integration-test -DBOARD=qemu
      - name: Build QEMU integration tests
        run: cmake --build --preset integration-test
      - name: Build guest boot package
        run: cmake --build --preset integration-test --target guest_pkg
      - name: Run QEMU integration tests
        uses: ./.github/actions/run-qemu-integration
        with:
          kernel: build/integration-test/kernel8.img
          initrd: boot/profiles/guest-qemu.hvgbp
          log: build/integration-test/qemu.log
      - name: Upload QEMU serial logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-logs
          path: build/integration-test/*.log
