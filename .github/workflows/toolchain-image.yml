name: Build CI Toolchain Image

on:
  push:
    branches: [main]
    paths: [ci/Dockerfile]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ci
          push: true
          tags: |
            ghcr.io/matthewchavis8/hyperberry-ci:latest
            ghcr.io/matthewchavis8/hyperberry-ci:${{ github.sha }}
